version: '3.8'

services:
  # 1. Base de Datos centralizada para Innovatech
  innovatech-db:
    image: mysql:8
    container_name: innovatech-db
    environment:
      MYSQL_ROOT_PASSWORD: Superlol611.
      MYSQL_DATABASE: innovatech_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  # 2. Microservicio de Venta (Java - Puerto corregido según tu SG)
  backend-ventas:
    image: ${DOCKERHUB_USERNAME}/backend-ventas:latest
    container_name: backend-ventas
    environment:
      - DB_ENDPOINT=innovatech-db
      - DB_PORT=3306
      - DB_NAME=innovatech_db
      - DB_USERNAME=root
      - DB_PASSWORD=Superlol611.
    ports:
      - "8081:8080"  # Mapea el puerto 8081 externo (tu SG) al 8080 interno de Spring
    depends_on:
      - innovatech-db

  # 3. Microservicio de Despacho (Java - Puerto corregido según tu SG)
  backend-despachos:
    image: ${DOCKERHUB_USERNAME}/backend-despachos:latest
    container_name: backend-despachos
    environment:
      - DB_ENDPOINT=innovatech-db
      - DB_PORT=3306
      - DB_NAME=innovatech_db
      - DB_USERNAME=root
      - DB_PASSWORD=Superlol611.
    ports:
      - "8082:8080"  # Mapea el puerto 8082 externo (tu SG) al 8080 interno de Spring
    depends_on:
      - innovatech-db

volumes:
  db_data: